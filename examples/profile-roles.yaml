#
# Example: Login/Service Node Profile
# This config targets login and service nodes.

apiVersion: boot.openchami.io/v1
kind: BootConfiguration
metadata:
  name: login-standard
spec:
  profile: "login"
  hosts:
    - "login[0-9]"
    - "service[0-9]"
  kernel: "http://files.openchami.org/vmlinuz-login"
  initrd: "http://files.openchami.org/initramfs-login.img"
  params: |
    console=ttyS0,115200
    root=/dev/nvme0n1p1
  priority: 50
