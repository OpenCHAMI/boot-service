name: golangci-lint

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up latest stable Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
      - uses: actions/checkout@v6.0.2
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
