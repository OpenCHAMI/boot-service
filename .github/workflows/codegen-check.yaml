name: Codegen Check

on:
  pull_request:
    branches: [main]
    paths:
      - "apis/**"
      - "apis.yaml"
      - ".fabrica.yaml"
      - "cmd/server/**"
      - "internal/storage/**"
      - "pkg/client/**"
      - "pkg/resources/register_generated.go"
      - "Makefile"
      - ".github/workflows/codegen-check.yaml"
  workflow_dispatch:

jobs:
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: stable

      - name: Verify generated code is committed
        run: make generate-check
